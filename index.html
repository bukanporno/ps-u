<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Playstation</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none !important; }
        .glow-orange { box-shadow: 0 0 15px rgba(249,115,22,0.3); }
        .glow-red { box-shadow: 0 0 20px rgba(239,68,68,0.5); }
    </style>
</head>
<body class="min-h-screen relative font-sans text-neutral-300">

    <!-- Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-[radial-gradient(circle_at_center,_rgba(249,115,22,0.1)_0%,_transparent_70%)] opacity-50"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[70%] h-[70%] rounded-full bg-[radial-gradient(circle_at_center,_rgba(245,158,11,0.1)_0%,_transparent_70%)] opacity-50"></div>
    </div>

    <!-- Header -->
    <header class="relative z-10 border-b border-white/5 bg-black/50 backdrop-blur-md shadow-xl">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase leading-none">
                    ULT<span class="text-orange-500">I</span>MATE
                </h1>
                <h2 class="text-sm font-bold tracking-[0.4em] text-white uppercase leading-none mt-1">PLAYSTATION</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase tracking-widest text-neutral-500">Pendapatan Hari Ini</p>
                <p class="text-2xl font-black text-orange-400 font-mono" id="total-revenue">Rp 0</p>
            </div>
        </div>
    </header>

    <main class="relative z-10 max-w-6xl mx-auto px-6 py-10">
        <!-- New Session Form Modal / Section -->
        <div id="new-session-form" class="hidden mb-10 glass p-6 rounded-2xl shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-4 uppercase tracking-widest">+ Mulai Sesi Baru</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-neutral-500 mb-2">Pilih TV</label>
                    <select id="input-tv" class="w-full bg-neutral-900 border border-white/10 rounded p-3 outline-none text-white focus:border-orange-500"></select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-neutral-500 mb-2">Pilih Console</label>
                    <select id="input-console" class="w-full bg-neutral-900 border border-white/10 rounded p-3 outline-none text-white focus:border-orange-500">
                        <option value="PS3">PlayStation 3 (Rp 5.000/jam)</option>
                        <option value="PS4">PlayStation 4 (Rp 7.000/jam)</option>
                        <option value="PS4Pro">PS 4 Pro (Rp 8.000/jam)</option>
                        <option value="PS5">PlayStation 5 (Rp 10.000/jam)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-neutral-500 mb-2">Durasi (Menit, 0 = Open Bill)</label>
                    <input type="number" id="input-duration" value="0" min="0" step="5" class="w-full bg-neutral-900 border border-white/10 rounded p-3 outline-none text-white focus:border-orange-500">
                </div>
                <div>
                    <button onclick="startSession()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded uppercase tracking-widest text-xs transition-colors">MULAI</button>
                    <button onclick="toggleForm()" class="w-full mt-2 bg-transparent text-neutral-400 hover:text-white font-bold py-2 rounded uppercase tracking-widest text-[10px] transition-colors">BATAL</button>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold uppercase tracking-widest text-neutral-200">Live Monitor</h2>
            <button onclick="toggleForm()" class="bg-orange-600 hover:bg-orange-500 text-white px-5 py-2 rounded text-[10px] uppercase tracking-widest font-bold">
                + Tambah Pemain
            </button>
        </div>

        <!-- TV Grid -->
        <div id="tv-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
            <!-- Rendered via JS -->
        </div>

        <div class="border-t border-white/5 pt-8 mt-10">
            <h3 class="text-sm font-bold uppercase tracking-widest text-neutral-400 mb-4">Riwayat Kasir</h3>
            <div id="history-list" class="space-y-3">
                <p class="text-neutral-600 text-xs text-center py-6">Belum ada riwayat transaksi.</p>
            </div>
        </div>
    </main>

    <script>
        const STATIONS = ["TV 1", "TV 2", "TV 3", "TV 4", "TV 5", "TV 6", "TV 7", "TV 8"];
        const CONSOLES = {
            "PS3": { name: "PS3", price: 5000 },
            "PS4": { name: "PS4", price: 7000 },
            "PS4Pro": { name: "PS4 Pro", price: 8000 },
            "PS5": { name: "PS5", price: 10000 },
        };

        let sessions = {}; 
        let historyArr = [];
        let totalRevenue = 0;

        function formatRupiah(amount) {
            return new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", maximumFractionDigits: 0 }).format(amount);
        }

        function formatTime(totalSeconds) {
            let h = Math.floor(Math.abs(totalSeconds) / 3600);
            let m = Math.floor((Math.abs(totalSeconds) % 3600) / 60);
            let s = Math.abs(totalSeconds) % 60;
            return `${totalSeconds < 0 ? "-" : ""}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleForm() {
            const formObj = document.getElementById('new-session-form');
            if (formObj.classList.contains('hidden')) {
                formObj.classList.remove('hidden');
                updateTVOptions();
            } else {
                formObj.classList.add('hidden');
            }
        }

        function updateTVOptions() {
            const select = document.getElementById('input-tv');
            select.innerHTML = "";
            STATIONS.forEach(tv => {
                const isUsed = !!sessions[tv];
                select.innerHTML += `<option value="${tv}" ${isUsed ? "disabled" : ""}>${tv} ${isUsed ? "(Terpakai)" : ""}</option>`;
            });
        }

        function startSession() {
            const tv = document.getElementById('input-tv').value;
            const consoleId = document.getElementById('input-console').value;
            const durationInput = parseInt(document.getElementById('input-duration').value) || 0;
            
            if (!tv || sessions[tv]) return alert("Pilih TV yang kosong!");

            sessions[tv] = {
                stationName: tv,
                consoleId: consoleId,
                startTime: Date.now(),
                targetDurationMs: durationInput * 60 * 1000
            };
            
            toggleForm();
            renderGrid();
        }

        function checkout(tv) {
            const session = sessions[tv];
            if (!session) return;

            const elapsedMs = Date.now() - session.startTime;
            let billMs = session.targetDurationMs > 0 && elapsedMs < session.targetDurationMs ? session.targetDurationMs : elapsedMs;
            let billHours = billMs / (1000 * 60 * 60);
            let price = CONSOLES[session.consoleId].price;
            let total = Math.round((billHours * price) / 100) * 100;

            historyArr.unshift({
                stationName: tv,
                consoleName: CONSOLES[session.consoleId].name,
                durationStr: formatTime(Math.floor(elapsedMs / 1000)),
                totalPrice: total
            });

            totalRevenue += total;
            document.getElementById('total-revenue').innerText = formatRupiah(totalRevenue);
            
            delete sessions[tv];
            renderGrid();
            renderHistory();
        }

        function renderGrid() {
            const grid = document.getElementById('tv-grid');
            grid.innerHTML = "";

            STATIONS.forEach(tv => {
                const session = sessions[tv];
                
                if (session) {
                    // render active
                    grid.innerHTML += `
                        <div class="glass p-5 rounded-xl border-l-4 border-l-orange-500 glow-orange flex flex-col justify-between" id="card-${tv.replace(' ', '-')}">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-orange-500/20 text-orange-400 text-[10px] px-2 py-1 rounded font-bold uppercase">${tv} • ${CONSOLES[session.consoleId].name}</span>
                                <span class="text-green-400 text-[10px] uppercase font-bold animate-pulse">● Active</span>
                            </div>
                            <div class="mb-4">
                                <div class="text-3xl font-black font-mono text-white" id="time-${tv.replace(' ', '-')}">00:00:00</div>
                                <div class="text-[10px] text-neutral-500 uppercase mt-1" id="status-${tv.replace(' ', '-')}">Loading...</div>
                            </div>
                            <div class="flex justify-between items-center pt-4 border-t border-white/10 mt-auto">
                                <div class="text-xs text-neutral-500">Bill: <span class="text-orange-400 font-bold" id="bill-${tv.replace(' ', '-')}">Rp 0</span></div>
                                <button onclick="checkout('${tv}')" class="bg-red-500/20 text-red-500 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded text-[10px] uppercase font-bold transition-colors">Checkout</button>
                            </div>
                        </div>
                    `;
                } else {
                    // render idle
                    grid.innerHTML += `
                        <div class="glass p-5 rounded-xl border border-white/5 opacity-60 hover:opacity-100 transition-opacity flex flex-col justify-between min-h-[180px]">
                            <div class="flex justify-between items-start">
                                <span class="text-white font-black text-xl uppercase">${tv}</span>
                            </div>
                            <div class="text-center my-4">
                                <span class="text-green-500 font-bold uppercase tracking-widest text-sm">Tersedia</span>
                            </div>
                            <button onclick="toggleForm()" class="w-full bg-white/5 hover:bg-white/10 text-white py-2 rounded text-[10px] uppercase font-bold transition-colors">Isi TV Ini</button>
                        </div>
                    `;
                }
            });
            updateTimers();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (historyArr.length === 0) return;
            
            list.innerHTML = "";
            historyArr.slice(0, 10).forEach(item => {
                list.innerHTML += `
                    <div class="glass p-4 rounded-xl flex justify-between items-center group">
                        <div class="flex flex-col">
                            <span class="text-orange-400 font-bold text-xs uppercase">${item.stationName} <span class="text-neutral-500 ml-2">${item.consoleName}</span></span>
                            <span class="text-neutral-400 text-[10px] mt-1 font-mono">${item.durationStr}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-orange-400 font-black font-mono text-sm">${formatRupiah(item.totalPrice)}</span>
                        </div>
                    </div>
                `;
            });
        }

        function updateTimers() {
            const now = Date.now();
            Object.keys(sessions).forEach(tv => {
                const session = sessions[tv];
                const elapsedMs = now - session.startTime;
                const isTimed = session.targetDurationMs > 0;
                const isFinished = isTimed && elapsedMs >= session.targetDurationMs;

                let displayMs = isTimed ? (isFinished ? elapsedMs - session.targetDurationMs : session.targetDurationMs - elapsedMs) : elapsedMs;
                let billMs = isTimed && !isFinished ? session.targetDurationMs : elapsedMs;
                
                let billHours = billMs / (1000 * 60 * 60);
                let price = CONSOLES[session.consoleId].price;
                let total = Math.round((billHours * price) / 100) * 100;

                const timeEl = document.getElementById(\`time-\${tv.replace(' ', '-')}\`);
                const statusEl = document.getElementById(\`status-\${tv.replace(' ', '-')}\`);
                const billEl = document.getElementById(\`bill-\${tv.replace(' ', '-')}\`);
                const cardEl = document.getElementById(\`card-\${tv.replace(' ', '-')}\`);

                if (timeEl) {
                    timeEl.innerText = (isTimed && isFinished ? "-" : "") + formatTime(Math.floor(displayMs / 1000));
                    billEl.innerText = formatRupiah(total);
                    
                    if (isFinished && isTimed) {
                        timeEl.classList.remove("text-white");
                        timeEl.classList.add("text-red-500", "animate-pulse");
                        statusEl.innerText = "OVERTIME";
                        statusEl.classList.add("text-red-500");
                        cardEl.classList.remove("border-l-orange-500", "glow-orange");
                        cardEl.classList.add("border-l-red-500", "glow-red");
                    } else {
                        statusEl.innerText = isTimed ? "Sewa Per Jam" : "Sewa Bebas (Open Bill)";
                    }
                }
            });
        }

        setInterval(updateTimers, 1000);
        renderGrid();
    </script>
</body>
</html>
